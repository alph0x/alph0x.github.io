<!-- CONTACT FORM -->
<section id="contact" class="reveal space-y-8">
  <h2 class="text-[22px] font-semibold tracking-tight text-gray-900 dark:text-white">Contact</h2>
  <div class="glass rounded-2xl p-7">
    <form action="https://formspree.io/f/your-form-id" method="POST">
      <div class="grid sm:grid-cols-2 gap-4">
        <input type="text" name="name" placeholder="Your name" required class="w-full px-4 py-2 rounded-lg bg-white/50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-[#0071e3]">
        <input type="email" name="email" placeholder="Your email" required class="w-full px-4 py-2 rounded-lg bg-white/50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-[#0071e3]">
      </div>
      <textarea name="message" rows="5" placeholder="Your message" required class="mt-4 w-full px-4 py-2 rounded-lg bg-white/50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-[#0071e3]"></textarea>
      <button type="submit" class="mt-4 px-6 py-2 bg-[#0071e3] text-white rounded-lg hover:bg-[#005bb5] transition-colors">Send</button>
    </form>
  </div>
</section>
